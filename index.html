<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SISDECAT</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This error often happens when node-fetch or similar tries to polyfill fetch in a browser environment.
      if (typeof window !== 'undefined') {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get() { return originalFetch; },
            set() { /* Ignore attempts to overwrite fetch */ },
            configurable: true
          });
        } catch (e) {
          console.warn('Could not redefine fetch property:', e);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
